{{define "title"}}Login{{end}}
{{define "content"}}
<div class="login-box">
    <h2>Login</h2>
    {{if .Error}}<p class="flash-error">{{.Error}}</p>{{end}}
    <button id="passkey-btn" type="button" class="passkey-hidden passkey-btn-full">Sign in with passkey</button>
    <div id="passkey-divider" class="passkey-divider passkey-hidden">
        <span class="passkey-divider-line"></span>
        <span class="passkey-divider-text">or</span>
        <span class="passkey-divider-line"></span>
    </div>
    <form method="POST" action="/admin/login" id="login-form">
        <label>
            Username
            <input type="text" name="username" id="login-username" value="{{.Username}}" required autocomplete="username webauthn" autocapitalize="none" autocorrect="off" spellcheck="false">
        </label>
        <label>
            Password
            <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button type="submit">Login</button>
    </form>
</div>
<script src="/static/webauthn.js?v={{assetVer}}"></script>
<script src="/static/passkey-login.js?v={{assetVer}}"></script>
{{end}}
