openapi: "3.0.3"

info:
  title: Identity API
  version: "1.0.0"
  description: |
    Self-hosted JWT authentication and identity management service.

    ## Token model
    - **Access token**: short-lived JWT (15 minutes). Pass in `Authorization: Bearer <token>`. Never persist to disk.
    - **Refresh token**: long-lived opaque token (30-day sliding window). Rotated on every use — always persist the newest one immediately.

    ## Token family rotation & theft detection
    Every refresh call invalidates the submitted token and issues a new pair. If a previously-used (rotated) refresh token is ever presented again, the server treats it as a stolen token: the **entire token family** is revoked and `token_family_compromised` is returned. The legitimate client must log in again.

    ## Refresh implementation note
    Use a mutex around the refresh call. If multiple in-flight requests all receive a 401 simultaneously, only one should call `/auth/refresh`; the rest should wait and reuse the result. See docs/api.md for pseudocode.

servers:
  - url: https://{domain}/api/v1
    variables:
      domain:
        default: id.example.com
        description: Your deployment hostname

security: []

tags:
  - name: auth
    description: Authentication and session management
  - name: users
    description: User management (admin only except GET /users/{id})
  - name: oauth
    description: OAuth 2.0 Authorization Code + PKCE + Client Credentials (endpoints are at /oauth, not /api/v1)
  - name: webauthn
    description: Passkey / WebAuthn registration, authentication, and credential management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in, refresh_token]
      properties:
        access_token:
          type: string
          description: Short-lived JWT. Use in Authorization header. Do NOT persist to disk.
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Seconds until access token expires. Always 900 (15 minutes).
          example: 900
        refresh_token:
          type: string
          description: Long-lived opaque token. Store securely (Keychain / EncryptedSharedPreferences). Rotated on every use.

    User:
      type: object
      required: [id, username, display_name, role, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
        role:
          type: string
          enum: [user, admin]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    MeResponse:
      type: object
      required: [id, username, role, is_active]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        role:
          type: string
          enum: [user, admin]
        is_active:
          type: boolean

    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: |
            Snake_case error code. Always check this field, not the HTTP status alone.
            Known codes: invalid_credentials, account_disabled, invalid_refresh_token,
            token_expired, token_family_compromised, forbidden, not_found, username_taken,
            cannot_delete_last_admin, validation_error, user_limit_reached, weak_password,
            rate_limited, internal_error, webauthn_not_enabled, webauthn_invalid_challenge,
            webauthn_verification_failed, webauthn_credential_not_found, webauthn_credential_limit
        message:
          type: string
          description: Human-readable description. Do not parse programmatically.

    OAuthError:
      type: object
      required: [error, error_description]
      description: RFC 6749 error format used by /oauth/token
      properties:
        error:
          type: string
          enum: [invalid_request, invalid_grant, unsupported_grant_type, access_denied, server_error]
        error_description:
          type: string

    WebAuthnCredential:
      type: object
      required: [id, name, created_at, last_used_at]
      properties:
        id:
          type: string
          description: Internal UUID for this passkey (use this for rename/delete operations)
        name:
          type: string
          description: User-provided label for the passkey
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time

paths:
  /auth/login:
    post:
      operationId: login
      summary: Authenticate a user
      description: Returns a JWT access token and refresh token. No authentication required.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: alice
                password:
                  type: string
                  example: mysecretpassword
                device_hint:
                  type: string
                  description: Informational label shown in the admin UI. E.g. "iPhone 15 / iOS 18"
                  example: "iPhone 15 / iOS 18"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: invalid_credentials
                message: invalid username or password
        "403":
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: account_disabled
                message: account has been disabled
        "422":
          description: Validation error (missing username or password)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Rotate token pair
      description: |
        Exchange a refresh token for a new access token and refresh token.
        The submitted refresh token is **immediately invalidated**.
        Replaying a used token triggers `token_family_compromised` and revokes all sessions in that family.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Tokens rotated — persist the new refresh token immediately
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "401":
          description: Token invalid, expired, or family compromised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_refresh_token:
                  value:
                    error: invalid_refresh_token
                    message: the refresh token is invalid
                token_expired:
                  value:
                    error: token_expired
                    message: the refresh token has expired
                token_family_compromised:
                  value:
                    error: token_family_compromised
                    message: "token reuse detected — please log in again"
        "403":
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      operationId: logout
      summary: Revoke session(s)
      description: |
        Revokes the authenticated user's session(s).

        - If a JSON body with `refresh_token` is provided, only that device's session is revoked.
        - If the body is omitted entirely, **all sessions** for the user are revoked (sign out everywhere).

        The request body **must be JSON** if provided. Sending a non-empty body with any other
        content type (e.g. `application/x-www-form-urlencoded`) will return `400 invalid_request_body`.
      tags: [auth]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: The refresh token to revoke. Omit the body entirely to revoke all sessions.
            examples:
              revoke_one:
                summary: Revoke current session only
                value:
                  refresh_token: "4FaNtb_inHxcDlx..."
      responses:
        "204":
          description: Session(s) revoked successfully
        "400":
          description: Request body is non-empty but not valid JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_request_body:
                  value:
                    error: invalid_request_body
                    message: request body must be JSON
        "401":
          description: Missing or invalid access token

  /auth/me:
    get:
      operationId: getMe
      summary: Get current user
      description: Returns claims embedded in the JWT. Does not hit the database.
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        "401":
          description: Missing or invalid access token

  /users:
    get:
      operationId: listUsers
      summary: List all users
      description: Admin only.
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                required: [users, total]
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  total:
                    type: integer
        "401":
          description: Missing or invalid access token
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: forbidden
                message: admin role required

    post:
      operationId: createUser
      summary: Create a user
      description: Admin only. `role` defaults to `"user"` if omitted.
      tags: [users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                display_name:
                  type: string
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [user, admin]
                  default: user
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Missing or invalid access token
        "403":
          description: Admin role required
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: username_taken
                message: a user with that username already exists
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                weak_password:
                  value:
                    error: weak_password
                    message: password must be at least 8 characters
                user_limit_reached:
                  value:
                    error: user_limit_reached
                    message: the maximum number of users has been reached

  /users/{id}:
    get:
      operationId: getUser
      summary: Get a user
      description: Admins can get any user. Regular users can only get themselves — any other ID returns 403.
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Missing or invalid access token
        "403":
          description: Non-admin accessing another user's record
        "404":
          description: User not found

    put:
      operationId: updateUser
      summary: Update a user
      description: |
        Admin only. All fields are optional (partial update).
        Omitting `password` leaves it unchanged.
        Setting `is_active` to `false` immediately revokes all refresh tokens for that user.
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [user, admin]
                is_active:
                  type: boolean
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Missing or invalid access token
        "403":
          description: Admin role required
        "404":
          description: User not found
        "422":
          description: Weak password

    delete:
      operationId: deleteUser
      summary: Delete a user
      description: Admin only. The last admin cannot be deleted.
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: User deleted
        "401":
          description: Missing or invalid access token
        "403":
          description: Admin role required
        "404":
          description: User not found
        "409":
          description: Cannot delete last admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: cannot_delete_last_admin
                message: cannot delete the last admin user

  # ── OAuth endpoints (served at /oauth, not /api/v1) ──────────────

  /oauth/authorize:
    get:
      operationId: oauthAuthorize
      summary: Render OAuth login form
      description: |
        Validates the client and redirect URI, then renders a login form.
        This endpoint is at `/oauth/authorize` (not under `/api/v1`).
        Only `code_challenge_method=S256` is accepted.
      tags: [oauth]
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: code_challenge
          in: query
          required: true
          schema:
            type: string
        - name: code_challenge_method
          in: query
          required: true
          schema:
            type: string
            enum: [S256]
        - name: state
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Login form rendered (HTML)
        "400":
          description: Invalid client, redirect URI, or missing parameters (HTML error page)

    post:
      operationId: oauthAuthorizeSubmit
      summary: Submit OAuth login credentials
      description: |
        Authenticates the user and redirects to the client's redirect URI with an authorization code.
        The code is single-use and expires after 60 seconds.
      tags: [oauth]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [client_id, redirect_uri, code_challenge, username, password]
              properties:
                client_id:
                  type: string
                redirect_uri:
                  type: string
                state:
                  type: string
                code_challenge:
                  type: string
                username:
                  type: string
                password:
                  type: string
      responses:
        "302":
          description: Redirect to client with `?code=...&state=...`
        "200":
          description: Login form re-rendered with error (bad credentials)

  # ── WebAuthn / Passkey endpoints ───────────────────────────────

  /webauthn/register/begin:
    post:
      operationId: webauthnRegisterBegin
      summary: Begin passkey registration
      description: |
        Starts the WebAuthn registration ceremony for the authenticated user.
        Returns credential creation options (pass to `navigator.credentials.create()`)
        and a `challenge_id` to submit back in the finish step.
        Challenges expire after 120 seconds.
      tags: [webauthn]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registration ceremony started
          content:
            application/json:
              schema:
                type: object
                required: [publicKey, challenge_id]
                properties:
                  publicKey:
                    type: object
                    description: WebAuthn PublicKeyCredentialCreationOptions — pass directly to navigator.credentials.create()
                  challenge_id:
                    type: string
                    description: Server-generated challenge ID. Submit this in the finish step.
        "400":
          description: Passkeys not enabled on this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: webauthn_not_enabled
                message: passkeys are not enabled on this server
        "401":
          description: Missing or invalid access token
        "409":
          description: Maximum number of passkeys reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: webauthn_credential_limit
                message: maximum number of passkeys reached

  /webauthn/register/finish:
    post:
      operationId: webauthnRegisterFinish
      summary: Complete passkey registration
      description: |
        Completes the WebAuthn registration ceremony. The request body is the raw
        JSON output from `navigator.credentials.create()`. The challenge ID is
        required (via query parameter or `X-Challenge-ID` header). An optional
        passkey name can be provided via query parameter or `X-Passkey-Name` header.
      tags: [webauthn]
      security:
        - bearerAuth: []
      parameters:
        - name: challenge_id
          in: query
          required: true
          description: Challenge ID from the begin step (also accepted via `X-Challenge-ID` header)
          schema:
            type: string
        - name: name
          in: query
          required: false
          description: Human-readable label for the passkey (also accepted via `X-Passkey-Name` header)
          schema:
            type: string
      requestBody:
        required: true
        description: Raw JSON output from navigator.credentials.create()
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Passkey registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebAuthnCredential'
        "400":
          description: Validation error, challenge invalid/expired, or verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_challenge:
                  value:
                    error: validation_error
                    message: challenge_id is required
                invalid_challenge:
                  value:
                    error: webauthn_invalid_challenge
                    message: challenge expired or not found
                verification_failed:
                  value:
                    error: webauthn_verification_failed
                    message: passkey registration verification failed
                not_enabled:
                  value:
                    error: webauthn_not_enabled
                    message: passkeys are not enabled on this server
        "401":
          description: Missing or invalid access token

  /webauthn/login/begin:
    post:
      operationId: webauthnLoginBegin
      summary: Begin passkey authentication
      description: |
        Starts the WebAuthn authentication ceremony. No authentication required.
        If `username` is provided, the server associates the challenge with that user
        (but still uses discoverable credential flow to prevent username enumeration).
        If `username` is omitted, uses a fully discoverable credential flow.
        Returns assertion options (pass to `navigator.credentials.get()`)
        and a `challenge_id` for the finish step.
      tags: [webauthn]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Optional username hint. Omit for fully discoverable (usernameless) login.
                  example: alice
      responses:
        "200":
          description: Authentication ceremony started
          content:
            application/json:
              schema:
                type: object
                required: [publicKey, challenge_id]
                properties:
                  publicKey:
                    type: object
                    description: WebAuthn PublicKeyCredentialRequestOptions — pass directly to navigator.credentials.get()
                  challenge_id:
                    type: string
                    description: Server-generated challenge ID. Submit this in the finish step.
        "400":
          description: Passkeys not enabled on this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: webauthn_not_enabled
                message: passkeys are not enabled on this server

  /webauthn/login/finish:
    post:
      operationId: webauthnLoginFinish
      summary: Complete passkey authentication
      description: |
        Completes the WebAuthn authentication ceremony and issues JWT tokens.
        The request body is the raw JSON output from `navigator.credentials.get()`.
        The challenge ID is required (via query parameter or `X-Challenge-ID` header).
        On success, returns the same token response as password-based login.
      tags: [webauthn]
      parameters:
        - name: challenge_id
          in: query
          required: true
          description: Challenge ID from the begin step (also accepted via `X-Challenge-ID` header)
          schema:
            type: string
      requestBody:
        required: true
        description: Raw JSON output from navigator.credentials.get()
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Authentication successful — tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "400":
          description: Validation error or challenge invalid/expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_challenge:
                  value:
                    error: validation_error
                    message: challenge_id query parameter is required
                invalid_challenge:
                  value:
                    error: webauthn_invalid_challenge
                    message: challenge expired or not found
                not_enabled:
                  value:
                    error: webauthn_not_enabled
                    message: passkeys are not enabled on this server
        "401":
          description: Passkey verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: webauthn_verification_failed
                message: passkey authentication failed
        "403":
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: account_disabled
                message: account has been disabled

  /webauthn/credentials:
    get:
      operationId: webauthnListCredentials
      summary: List passkeys
      description: Returns all registered passkeys for the authenticated user.
      tags: [webauthn]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Passkey list
          content:
            application/json:
              schema:
                type: object
                required: [credentials, total]
                properties:
                  credentials:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebAuthnCredential'
                  total:
                    type: integer
        "401":
          description: Missing or invalid access token

  /webauthn/credentials/{id}:
    patch:
      operationId: webauthnRenameCredential
      summary: Rename a passkey
      description: Updates the display name of a passkey owned by the authenticated user.
      tags: [webauthn]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Internal passkey UUID (from the `id` field in credential responses)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: New display name for the passkey (max 100 characters, control characters stripped)
      responses:
        "204":
          description: Passkey renamed
        "400":
          description: Invalid JSON
        "401":
          description: Missing or invalid access token
        "404":
          description: Passkey not found (or not owned by this user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: webauthn_credential_not_found
                message: passkey not found

    delete:
      operationId: webauthnDeleteCredential
      summary: Delete a passkey
      description: Permanently removes a passkey owned by the authenticated user.
      tags: [webauthn]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Internal passkey UUID (from the `id` field in credential responses)
          schema:
            type: string
      responses:
        "204":
          description: Passkey deleted
        "401":
          description: Missing or invalid access token
        "404":
          description: Passkey not found (or not owned by this user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: webauthn_credential_not_found
                message: passkey not found

  # --- OAuth / Client Credentials ---

  /oauth/token:
    post:
      operationId: oauthToken
      tags: [oauth]
      summary: Token endpoint
      description: |
        Supports four grant types:
        - `authorization_code` — exchange an auth code + PKCE verifier for tokens
        - `refresh_token` — rotate a refresh token for a new token pair
        - `client_credentials` — service authenticates with client_id + client_secret, receives an access token (no refresh token)
        - `urn:ietf:params:oauth:grant-type:device_code` — RFC 8628 device flow poll. The device polls with its device_code from `/oauth/device_authorization` or `/oauth/device/claim` and receives tokens once a user has approved.

        For `client_credentials`, authenticate via `Authorization: Basic base64(client_id:client_secret)` or form body.

        Device flow poll responses reuse the RFC 6749 error envelope with codes `authorization_pending`, `slow_down`, `access_denied`, `expired_token`, or `invalid_grant`.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum:
                    - authorization_code
                    - refresh_token
                    - client_credentials
                    - "urn:ietf:params:oauth:grant-type:device_code"
                scope:
                  type: string
                  description: Space-delimited scopes (client_credentials, device_code)
                client_id:
                  type: string
                client_secret:
                  type: string
                code:
                  type: string
                redirect_uri:
                  type: string
                code_verifier:
                  type: string
                refresh_token:
                  type: string
                device_code:
                  type: string
                  description: Opaque device code from /oauth/device_authorization (device flow only)
      responses:
        "200":
          description: Token(s) issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 900
                  refresh_token:
                    type: string
                  scope:
                    type: string
        "400":
          description: Invalid request, unsupported grant type, invalid scope, or unauthorized client
        "401":
          description: Invalid client credentials

  /oauth/device_authorization:
    post:
      operationId: deviceAuthorization
      tags: [oauth]
      summary: Device authorization grant (RFC 8628)
      description: |
        Headless devices call this to begin a device flow. The device shows
        the returned `user_code` and `verification_uri` to the user, then polls
        `/oauth/token` with the `device_code` until the user approves.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [client_id]
              properties:
                client_id:
                  type: string
                scope:
                  type: string
                  description: Space-delimited scopes
      responses:
        "200":
          description: Device authorization issued
          content:
            application/json:
              schema:
                type: object
                required: [device_code, user_code, verification_uri, expires_in, interval]
                properties:
                  device_code:
                    type: string
                    description: Opaque polling secret — show only to the device
                  user_code:
                    type: string
                    example: "ABCD-EFGH"
                  verification_uri:
                    type: string
                    format: uri
                  verification_uri_complete:
                    type: string
                    format: uri
                    description: verification_uri with user_code pre-filled
                  expires_in:
                    type: integer
                    example: 600
                  interval:
                    type: integer
                    description: Minimum seconds between token-endpoint polls
                    example: 5
        "400":
          description: Invalid request, unknown client, or unauthorized client

  /oauth/device/claim:
    post:
      operationId: deviceClaim
      tags: [oauth]
      summary: Device flow claim-code exchange (screenless devices)
      description: |
        A device with a pre-shared claim code (printed on its sticker) exchanges
        the claim code for a device_code it can poll with. If the claim code is
        already bound to a user the session is auto-approved on the first poll —
        no user interaction is needed on that boot.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [client_id, claim_code]
              properties:
                client_id:
                  type: string
                claim_code:
                  type: string
                scope:
                  type: string
      responses:
        "200":
          description: Device session created
          content:
            application/json:
              schema:
                type: object
                required: [device_code, verification_uri, expires_in, interval]
                properties:
                  device_code:
                    type: string
                  user_code:
                    type: string
                  claim_code:
                    type: string
                  verification_uri:
                    type: string
                  verification_uri_complete:
                    type: string
                  expires_in:
                    type: integer
                  interval:
                    type: integer
        "400":
          description: Unknown or revoked claim code, unknown client, or unauthorized client

  /oauth/device:
    get:
      operationId: deviceVerifyGet
      tags: [oauth]
      summary: Device verification page (HTML)
      description: |
        Server-rendered verification page. A user lands here from the device's
        displayed verification_uri (or by scanning a claim-code QR sticker). The
        `user_code` query param (or `code` for claim-code sessions) is pre-filled.
      parameters:
        - in: query
          name: user_code
          schema: { type: string }
        - in: query
          name: code
          schema: { type: string }
      responses:
        "200":
          description: HTML verification/approval page
    post:
      operationId: deviceVerifyPost
      tags: [oauth]
      summary: Device approval submission
      description: |
        User submits credentials and action. `action=approve` authenticates and
        approves the session. `action=deny` rejects. Returns an HTML result page.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [user_code, action]
              properties:
                user_code:
                  type: string
                username:
                  type: string
                password:
                  type: string
                action:
                  type: string
                  enum: [approve, deny]
      responses:
        "200":
          description: HTML confirmation page

  /oauth/introspect:
    post:
      tags: [oauth]
      summary: Token introspection (RFC 7662)
      description: Validates a token and returns its claims. Requires client authentication.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Introspection result
          content:
            application/json:
              schema:
                type: object
                required: [active]
                properties:
                  active:
                    type: boolean
                  sub:
                    type: string
                  client_id:
                    type: string
                  scope:
                    type: string
                  token_type:
                    type: string
        "401":
          description: Missing or invalid client credentials

  /.well-known/oauth-authorization-server:
    get:
      tags: [oauth]
      summary: Authorization server metadata (RFC 8414)
      responses:
        "200":
          description: Server metadata (issuer, endpoints, supported grant types, JWKS URI)
