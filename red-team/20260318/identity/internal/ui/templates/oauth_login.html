{{define "title"}}Sign in{{end}}
{{define "content"}}
<div style="max-width:420px;margin:4rem auto">
    <h2>Sign in to {{.ClientName}}</h2>
    <p><small>You are signing in to <strong>{{.ClientName}}</strong> using your Identity account.</small></p>
    {{if .Error}}<p class="flash-error">{{.Error}}</p>{{end}}
    <form method="POST" action="/oauth/authorize">
        <input type="hidden" name="client_id" value="{{.ClientID}}">
        <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
        <input type="hidden" name="state" value="{{.State}}">
        <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
        <input type="hidden" name="code_challenge_method" value="S256">
        <label>
            Username
            <input type="text" name="username" value="{{.Username}}" autofocus required autocomplete="username">
        </label>
        <label>
            Password
            <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button type="submit">Sign in</button>
    </form>
</div>
{{end}}
