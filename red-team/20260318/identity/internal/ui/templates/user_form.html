{{define "title"}}{{if .User}}Edit User{{else}}Create User{{end}}{{end}}
{{define "content"}}
<h2>{{if .User}}Edit User{{else}}Create User{{end}}</h2>
{{if .Error}}<p class="flash-error">{{.Error}}</p>{{end}}
<form method="POST" action="{{.FormAction}}" id="user-form">
    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
    <label>
        Username
        <input type="text" name="username" value="{{if .User}}{{.User.Username}}{{else}}{{.FormUsername}}{{end}}"
               {{if .User}}readonly{{else}}required{{end}}>
    </label>
    <label>
        Display Name
        <input type="text" name="display_name" value="{{if .User}}{{.User.DisplayName}}{{else}}{{.FormDisplayName}}{{end}}">
    </label>
    <label>
        Password{{if .User}} <small>(leave blank to keep current)</small>{{end}}
        <input type="password" name="password" id="password" {{if not .User}}required{{end}}>
        <small>Minimum {{.MinPasswordLength}} characters.</small>
    </label>
    <label>
        Confirm Password
        <input type="password" id="password_confirm" {{if not .User}}required{{end}}>
    </label>
    <p id="pw-mismatch" class="flash-error" style="display:none">Passwords do not match.</p>
    <label>
        Role
        <select name="role">
            <option value="user" {{if eq .SelectedRole "user"}}selected{{end}}>User</option>
            <option value="admin" {{if eq .SelectedRole "admin"}}selected{{end}}>Admin</option>
        </select>
    </label>
    {{if .User}}
    <label>
        <input type="checkbox" name="is_active" value="1" {{if .User.IsActive}}checked{{end}}>
        Active
    </label>
    {{end}}
    <div class="flex-row">
        <button type="submit">{{if .User}}Save Changes{{else}}Create User{{end}}</button>
        <a href="/admin/users" class="btn btn-secondary">Cancel</a>
    </div>
</form>
<script>
(function() {
    var pw = document.getElementById('password');
    var confirm = document.getElementById('password_confirm');
    var msg = document.getElementById('pw-mismatch');
    var form = document.getElementById('user-form');

    function validate() {
        if (confirm.value && pw.value !== confirm.value) {
            msg.style.display = 'block';
            confirm.setAttribute('aria-invalid', 'true');
            return false;
        }
        msg.style.display = 'none';
        confirm.removeAttribute('aria-invalid');
        return true;
    }

    confirm.addEventListener('input', validate);
    pw.addEventListener('input', function() { if (confirm.value) validate(); });

    form.addEventListener('submit', function(e) {
        if (!validate()) { e.preventDefault(); return; }
        if (pw.value === '' && confirm.value === '') return;
        if (pw.value !== confirm.value) { e.preventDefault(); }
    });
})();
</script>
{{end}}
